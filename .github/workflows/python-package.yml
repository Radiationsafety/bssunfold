# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write  # needed for Trusted Publishing (PyPI OIDC)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with ruff
      run: uv run ruff check --output-format=github src/ tests/

    - name: Test with pytest
      run: uv run pytest

  coverage-and-codacy:
    runs-on: ubuntu-latest
    name: Generate coverage and upload to Codacy
    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: uv sync --group dev

    - name: Test with pytest and coverage
      run: uv run pytest --cov=src/bssunfold --cov-report=xml --cov-report=html

    - name: Run codacy-coverage-reporter
      uses: codacy/codacy-coverage-reporter-action@v1
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        coverage-reports: coverage.xml

  # ─────────────────────────────────────────────────────────────
  # Publish to PyPI — only on version tags (e.g. v0.5.0)
  # Uses Trusted Publishing (OIDC) — no API token required.
  # ─────────────────────────────────────────────────────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage-and-codacy]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # mandatory for Trusted Publishing

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      run: uv publish