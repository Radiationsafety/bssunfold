[project]
name = "bssunfold"
version = "0.10.0"
description = "Python package for neutron spectrum unfolding from measurements obtained with Bonner Sphere Spectrometer (BSS)"
readme = "README.md"
authors = [
    { name = "Konstantin Chizhov", email = "kchizhov@jinr.ru" },
    { name = "Alexei Chizhov", email = "chizhov@jinr.ru" },
    { name = "Dmitry Borschev", email = "bds.22@uni-dubna.ru" },
    { name = "Maria Akimochkina", email = "a.m.a.mos@yandex.ru" },
]
maintainers = [
  {name = "Konstantin Chizhov", email = "kchizhov@jinr.ru"}
]
keywords = [ "unfolding", "BSS", "ill-posed task", "inverse problem", "Bonner sphere spectrometer"]

requires-python = ">=3.11"

classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
license ="GPL-3.0-only"
license-files = ["LICENSE"]

dependencies = [
    "cvxpy[ecos]>=1.7.5",
    "matplotlib>=3.10.8",
    "numpy>=2.4.1",
    "pandas>=2.2.3",
    "pyzmq>=27.1.0",
    "scipy>=1.16.3",
]

[project.optional-dependencies]
# Optional algorithmic backends (imported lazily inside function bodies with try/except)
lmfit = [
    "lmfit>=1.3.4",
]
mlem = [
    "odl>=1.0.0",
]
tikhonov = [
    "pytikhonov>=0.0.1",
]
qpsolvers = [
    "qpsolvers>=4.10.0",
]

test = [
    "pytest>=9.0.3",
]
# All optional backends
all = [
    "bssunfold[lmfit]",
    "bssunfold[mlem]",
    "bssunfold[tikhonov]",
    "bssunfold[qpsolvers]",
    "bssunfold[test]",
]
# Base set of QP solvers available on all platforms (including Windows)
solvers-core = [
    "qpsolvers[osqp,piqp,qpalm,ecos,scs,clarabel]>=4.10.0",
]
# ProxQP solver via proxsuite — NOT available on Windows
solvers-proxqp = [
    "proxsuite>=0.7.2",
]
# JAX-based solvers
solvers-jax = [
    "jax>=0.4.0",
    "jaxlib>=0.4.0",
    "jaxopt>=0.8.0",
]
# All optional solvers (Unix/Linux/macOS only — includes proxsuite)
all-solvers = [
    "bssunfold[solvers-core]",
    "bssunfold[solvers-proxqp]",
    "bssunfold[solvers-jax]",
]
# Recommended for Windows users (all solvers except proxsuite)
windows = [
    "bssunfold[solvers-core]",
    "bssunfold[solvers-jax]",
]

[project.scripts]
bssunfold = "bssunfold:main"

[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

# [tool.hatch.build]
# include = [
#     "src/bssunfold/**",
#     "README.md",
#     "LICENSE",
# ]

# exclude = [
#     "tests/**",
#     "assets/**",
